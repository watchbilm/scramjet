<!doctype html>
<html>
  <head>
    <title>{{mask}}{{Holy Unblocker LTS | Scramjet Proxy}}</title>
    {{ifSEO}}{{
    <meta
      name="description"
      content="Scramjet-only launcher page for opening specific URLs through the proxy."
    />
    }}
    <!--HEAD-CONTENT-->
    <script src="{{route}}{{/scram/scramjet.all.js}}" defer data-module></script>
    <script src="{{route}}{{/baremux/index.js}}" defer data-module></script>
    {{inline}}{{
    <script src="{{route}}{{/assets/js/register-sw.js}}{{inline}}" defer></script>
    }}
  </head>

  <body>
    <!-- IMPORTANT-HUCOOKINGINSERT-DONOTDELETE -->
    <!--ANTI-EXFIL-->
    <div id="header" class="fullwidth">
      <!--HEADER-->
    </div>

    <div id="mainbody" class="fullwidth">
      <div class="box-main-container">
        <div class="box-text-container">
          <h1>{{mask}}{{Scramjet URL Launcher}}</h1>
          <h2 class="box-description">
            {{mask}}{{Enter a full URL (or domain). This only opens that URL via Scramjet and does not perform search fallback.}}
          </h2>

          <form action="{{route}}{{/go}}" method="get" class="proxy-form" style="max-width: 860px;">
            <div class="search-box">
              <input
                type="text"
                spellcheck="false"
                autocomplete="off"
                placeholder="https://example.com"
                id="search-input"
                name="url"
                required
              />
            </div>
            <button type="submit" class="pr-button glowbutton" id="search-btn">OPEN URL</button>
          </form>
        </div>
      </div>
    </div>

    <div id="footer" class="fullwidth">
      <!--FOOTER-->
    </div>
    <!-- IMPORTANT-HUCOOKINGINSERT-DONOTDELETE -->
  </body>
</html>
